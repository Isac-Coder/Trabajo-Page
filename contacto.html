<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Contacto – La Cocketería</title>
    <link
      rel="stylesheet"
      href="styles-contacto.css"
    />
  </head>
  <body>
    <section class="contact-section">
      <p class="section-label">Encuéntranos</p>
      <h2 class="section-title">Contáctanos</h2>
      <p class="section-subtitle">
        ¿Tienes un pedido especial? ¡Escríbenos y lo hacemos realidad!
      </p>

      <div class="contact-grid">
        <!-- Columna izquierda: información -->
        <div class="info-card">
          <div class="info-item">
            <div class="icon-box">
              <svg viewBox="0 0 24 24">
                <path
                  d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"
                />
                <circle
                  cx="12"
                  cy="9"
                  r="2.5"
                />
              </svg>
            </div>
            <div>
              <p class="info-label">Dirección</p>
              <p class="info-value">Calle xx <div id="xx-xx">xx-xx</div> Barranquilla</p>
            </div>
          </div>

          <div class="info-item">
            <div class="icon-box">
              <svg viewBox="0 0 24 24">
                <path
                  d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.01 1.18 2 2 0 012 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14v2.92z"
                />
              </svg>
            </div>
            <div>
              <p class="info-label">WhatsApp</p>
              <p class="info-value">+57 300 000 0000</p>
            </div>
          </div>

          <div class="info-item">
            <div class="icon-box">
              <svg viewBox="0 0 24 24">
                <rect
                  x="2"
                  y="4"
                  width="20"
                  height="16"
                  rx="2"
                />
                <polyline points="2,4 12,13 22,4" />
              </svg>
            </div>
            <div>
              <p class="info-label">Correo</p>
              <p class="info-value">hola@lacocketeria.com</p>
            </div>
          </div>

          <hr class="divider" />

          <p class="info-label">Horarios</p>

          <div class="hour-row">
            <span class="day">Lunes – Viernes</span>
            <span class="time">9am – 7pm</span>
          </div>
          <div class="hour-row">
            <span class="day">Sábado</span>
            <span class="time">9am – 5pm</span>
          </div>
          <div class="hour-row">
            <span class="day">Domingo</span>
            <span class="time">Cerrado</span>
          </div>
        </div>

        <!-- Columna derecha: formulario -->
        <div class="form-card">
          <div class="form-row">
            <div class="form-group">
              <label for="nombre">Nombre</label>
              <input
                type="text"
                id="nombre"
                placeholder="Tu nombre"
              />
            </div>
            <div class="form-group">
              <label for="telefono">Teléfono</label>
              <input
                type="tel"
                id="telefono"
                placeholder="300 000 0000"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="correo">Correo electrónico</label>
            <input
              type="email"
              id="correo"
              placeholder="tu@correo.com"
            />
          </div>

          <div class="form-group">
            <label for="pedido">Tipo de pedido</label>
            <select id="pedido">
              <option value="">Selecciona una opción</option>
              <option>Pedido personal</option>
              <option>Evento o celebración</option>
              <option>Pedido corporativo</option>
              <option>Otro</option>
            </select>
          </div>

          <div class="form-group">
            <label for="mensaje">Mensaje</label>
            <textarea
              id="mensaje"
              placeholder="Cuéntanos qué necesitas..."
            ></textarea>
          </div>

          <button class="btn">Enviar mensaje</button>
        </div>
      </div>
    </section>
  </body>
</html>
